<!DOCTYPE html>
<html lang="en" id="root-html">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RouteFlow — Warehouse Delivery Optimizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --brand:#2563eb;--brand-h:#1d4ed8;--brand-light:#eff6ff;
  --surface:#fff;--surface-2:#f8fafc;--border:#e2e8f0;
  --text:#0f172a;--text-muted:#64748b;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --sidebar:260px;--radius:14px;
}
.dark{
  --brand:#3b82f6;--brand-h:#2563eb;--brand-light:#1e3a8a;
  --surface:#0f172a;--surface-2:#1e293b;--border:#334155;
  --text:#f1f5f9;--text-muted:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--surface-2);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.app{display:flex;height:100vh;overflow:hidden;transition:background .2s}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);transition:width .3s,background .2s,border-color .2s;position:relative;overflow:hidden}
.sidebar.collapsed{width:70px;min-width:70px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.navbar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;transition:background .2s,border-color .2s}
.content{flex:1;overflow-y:auto;padding:24px}
.logo-area{display:flex;align-items:center;gap:12px;padding:20px 16px;border-bottom:1px solid var(--border);transition:border-color .2s}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.logo-text{font-weight:800;font-size:15px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.nav-section{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;padding:16px 18px 8px;display:block}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;margin:2px 8px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text-muted);transition:all .15s;user-select:none;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--brand-light);color:var(--brand);font-weight:600}
.nav-item .dot{width:6px;height:6px;background:var(--brand);border-radius:50%;margin-left:auto;flex-shrink:0}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border);transition:border-color .2s}
.collapse-btn{position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:24px;height:24px;background:var(--surface);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;z-index:10;transition:all .2s;box-shadow:0 2px 4px rgba(0,0,0,.1)}
.collapse-btn:hover{box-shadow:0 4px 8px rgba(0,0,0,.15)}
.nav-title{font-size:17px;font-weight:700;color:var(--text)}
.nav-sub{font-size:11px;color:var(--text-muted)}
.nav-right{display:flex;align-items:center;gap:10px}
.api-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:6px 12px;border-radius:99px;transition:all .3s}
.api-badge.online{background:#ecfdf5;color:#059669}
.dark .api-badge.online{background:#064e3b;color:#34d399}
.api-badge.loading{background:var(--surface-2);color:var(--text-muted)}
.api-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:background .2s,border-color .2s}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:border-color .2s}
.card-body{padding:20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;cursor:default}
.stat-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.07);transform:translateY(-1px)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-label{font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:800;color:var(--text);line-height:1}
.stat-change{font-size:11px;font-weight:500;color:var(--text-muted);margin-top:6px}
.form-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:6px}
.form-input{width:100%;padding:9px 12px;font-size:13px;font-family:inherit;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);outline:none;transition:all .15s}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.form-input::placeholder{color:var(--text-muted)}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.loc-item{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px;position:relative;transition:border-color .2s}
.loc-num{width:22px;height:22px;background:var(--brand-light);color:var(--brand);border-radius:50%;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0}
.loc-name-input{border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text);outline:none;width:calc(100% - 40px);font-family:inherit}
.loc-name-input::placeholder{color:var(--text-muted);font-weight:400}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3);width:100%}
.btn-primary:hover{box-shadow:0 6px 20px rgba(37,99,235,.4);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--brand);font-size:12px;padding:6px 10px;border-radius:8px}
.btn-ghost:hover{background:var(--brand-light)}
.btn-sm{font-size:11px;padding:5px 12px;border-radius:8px;background:var(--brand-light);color:var(--brand);border:none;cursor:pointer;font-family:inherit;font-weight:600}
.btn-sm:hover{background:#dbeafe}
.dark .btn-sm:hover{background:#1e3a8a}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spinner-blue{width:14px;height:14px;border:2px solid rgba(37,99,235,.2);border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.result-header{padding:14px 20px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.result-stat{padding:12px;border-radius:11px}
.result-stat-label{font-size:10.5px;font-weight:600;display:flex;align-items:center;gap:4px;margin-bottom:4px}
.result-stat-value{font-size:20px;font-weight:800;line-height:1}
.route-stop{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.route-stop:last-child{border:none}
.stop-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.stop-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.arrow{color:var(--border);font-size:11px;flex-shrink:0}
.map-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex:1}
.map-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.live-dot{width:8px;height:8px;background:#10b981;border-radius:50%;animation:pulse 2s ease-in-out infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#map{width:100%;height:520px}
.welcome-banner{background:linear-gradient(135deg,#1e40af,#2563eb,#3b82f6);border-radius:var(--radius);padding:28px 28px;color:#fff;margin-bottom:24px;position:relative;overflow:hidden}
.welcome-banner::after{content:'';position:absolute;top:-30px;right:-30px;width:200px;height:200px;background:rgba(255,255,255,.05);border-radius:50%}
.welcome-banner::before{content:'';position:absolute;bottom:-50px;right:80px;width:150px;height:150px;background:rgba(255,255,255,.04);border-radius:50%}
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
@media(max-width:700px){.quick-grid{grid-template-columns:1fr}}
.quick-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;text-decoration:none}
.quick-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);transform:translateY(-2px);border-color:var(--brand)}
.quick-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.quick-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.quick-desc{font-size:12px;color:var(--text-muted)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 16px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border:none}
tr:hover td{background:var(--surface-2)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.badge-blue{background:#eff6ff;color:#2563eb}
.badge-green{background:#ecfdf5;color:#059669}
.badge-amber{background:#fffbeb;color:#d97706}
.badge-violet{background:#f5f3ff;color:#7c3aed}
.dark .badge-blue{background:#1e3a8a;color:#93c5fd}
.dark .badge-green{background:#064e3b;color:#6ee7b7}
.dark .badge-amber{background:#451a03;color:#fcd34d}
.dark .badge-violet{background:#3b0764;color:#c4b5fd}
.optimizer-layout{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
@media(max-width:1000px){.optimizer-layout{grid-template-columns:1fr}}
.form-panel{max-height:calc(100vh - 130px);overflow-y:auto}
.error-box{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px 16px;border-radius:11px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.dark .error-box{background:#3b0000;border-color:#7f1d1d;color:#fca5a5}
.chart-placeholder{display:flex;align-items:flex-end;gap:8px;height:160px;padding:16px 0 0}
.bar{border-radius:6px 6px 0 0;transition:all .3s;cursor:pointer;min-width:28px}
.bar:hover{filter:brightness(1.1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}
.slide-up{animation:slideUp .35s ease}
.theme-toggle{background:none;border:none;cursor:pointer;font-size:16px;padding:8px 10px;border-radius:10px;transition:background .2s;color:var(--text-muted)}
.theme-toggle:hover{background:var(--surface-2)}
.leaflet-container{font-family:'Plus Jakarta Sans',sans-serif!important}
.leaflet-popup-content-wrapper{border-radius:10px!important;box-shadow:0 8px 24px rgba(0,0,0,.15)!important}
.leaflet-popup-content{font-family:'Plus Jakarta Sans',sans-serif!important;font-size:12px!important;margin:10px 14px!important}
</style>
</head>
<body>

<div class="app" id="app">
  <nav class="sidebar" id="sidebar">
    <div class="logo-area" id="logo-area">
      <div class="logo-icon">🚚</div>
      <div id="logo-text">
        <div class="logo-text">RouteFlow</div>
        <div class="logo-sub">Logistics Suite</div>
      </div>
    </div>
    <nav style="flex:1;padding:16px 8px;overflow-y:auto">
      <span class="nav-section" id="nav-section-label">Main Menu</span>
      <div class="nav-item active" onclick="setTab('dashboard')" id="nav-dashboard">
        <span class="nav-icon">⬛</span><span class="nav-label">Dashboard</span><span class="dot"></span>
      </div>
      <div class="nav-item" onclick="setTab('optimizer')" id="nav-optimizer">
        <span class="nav-icon">🗺️</span><span class="nav-label">Route Optimizer</span>
      </div>
      <div class="nav-item" onclick="setTab('history')" id="nav-history">
        <span class="nav-icon">📋</span><span class="nav-label">Route History</span>
      </div>
      <div class="nav-item" onclick="setTab('analytics')" id="nav-analytics">
        <span class="nav-icon">📊</span><span class="nav-label">Analytics</span>
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="nav-item" onclick="toggleDark()">
        <span class="nav-icon" id="dark-icon">🌙</span><span class="nav-label" id="dark-label">Dark Mode</span>
      </div>
    </div>
    <div class="collapse-btn" id="collapse-btn" onclick="toggleSidebar()">◀</div>
  </nav>

  <div class="main">
    <header class="navbar">
      <div>
        <div class="nav-title" id="page-title">Overview</div>
        <div class="nav-sub" id="page-sub">Your delivery operations at a glance</div>
      </div>
      <div class="nav-right">
        <div class="api-badge loading" id="api-badge">
          <span class="api-dot" style="background:#94a3b8"></span>Connecting…
        </div>
        <button class="theme-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
        <div class="avatar">WH</div>
      </div>
    </header>
    <div class="content" id="content-area"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let state = {
  tab: 'dashboard',
  dark: false,
  sidebarCollapsed: false,
  loading: false,
  roadDistLoading: false,
  result: null,
  history: [],
  warehouse: null,
  locationInputs: [
    { name: 'Stop A – Market',   lat: '22.7352', lng: '75.8412' },
    { name: 'Stop B – Hospital', lat: '22.7058', lng: '75.8734' },
    { name: 'Stop C – Mall',     lat: '22.7446', lng: '75.9012' },
    { name: 'Stop D – Station',  lat: '22.7183', lng: '75.8843' },
  ],
  map: null,
  layerGroup: null,
  error: null
};

function toggleDark() {
  state.dark = !state.dark;
  document.documentElement.classList.toggle('dark', state.dark);
  document.getElementById('dark-icon').textContent = state.dark ? '☀️' : '🌙';
  document.getElementById('dark-label').textContent = state.dark ? 'Light Mode' : 'Dark Mode';
  const themeBtn = document.querySelector('.theme-toggle');
  if (themeBtn) themeBtn.textContent = state.dark ? '☀️' : '🌙';
}

function toggleSidebar() {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('collapse-btn');
  const labels = sb.querySelectorAll('.nav-label, #logo-text, #nav-section-label, .logo-sub, .logo-text');
  if (state.sidebarCollapsed) {
    sb.classList.add('collapsed'); btn.textContent = '▶';
    labels.forEach(el => el.style.display = 'none');
  } else {
    sb.classList.remove('collapsed'); btn.textContent = '◀';
    labels.forEach(el => el.style.display = '');
  }
}

const tabMeta = {
  dashboard: { title: 'Overview',         sub: 'Your delivery operations at a glance' },
  optimizer: { title: 'Route Optimizer',  sub: 'TSP + real road distance via OSRM' },
  history:   { title: 'Route History',    sub: 'Past route computations this session' },
  analytics: { title: 'Analytics',        sub: 'Performance insights and trends' },
};
function setTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + tab);
  if (nav) {
    nav.classList.add('active');
    nav.querySelector('.dot')?.remove();
    const dot = document.createElement('span'); dot.className = 'dot';
    nav.appendChild(dot);
  }
  document.querySelectorAll('.nav-item:not(#nav-' + tab + ') .dot').forEach(d => d.remove());
  const meta = tabMeta[tab];
  document.getElementById('page-title').textContent = meta.title;
  document.getElementById('page-sub').textContent = meta.sub;
  render();
}

function getStats() {
  const h = state.history.filter(e => e.distance > 0); // only include computed
  const all = state.history;
  return {
    totalDel:   all.reduce((s,e) => s + e.stops, 0),
    totalDist:  h.reduce((s,e) => s + e.distance, 0).toFixed(1),
    totalFuel:  h.reduce((s,e) => s + e.fuel_cost, 0).toFixed(0),
    lastTime:   all.length > 0 ? all[0].time : '—'
  };
}

function render() {
  const area = document.getElementById('content-area');
  area.className = 'content fade-in';
  if      (state.tab === 'dashboard') renderDashboard(area);
  else if (state.tab === 'optimizer') renderOptimizer(area);
  else if (state.tab === 'history')   renderHistory(area);
  else if (state.tab === 'analytics') renderAnalytics(area);
}

// ── DASHBOARD ──────────────────────────────────────────────────────────
function renderDashboard(area) {
  const s = getStats();
  area.innerHTML = `
  <div style="max-width:1100px;margin:0 auto">
    <div class="welcome-banner" style="margin-bottom:24px">
      <div style="position:relative;z-index:1">
        <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">✨ TSP + Real Road Distance via OSRM</div>
        <h2 style="font-size:24px;font-weight:800;margin-bottom:6px">Welcome to RouteFlow</h2>
        <p style="font-size:13.5px;color:rgba(255,255,255,.8);max-width:480px;line-height:1.6;margin-bottom:20px">
          Optimize delivery routes using nearest-neighbour TSP, then measure <b>actual road distances</b> via OSRM — not straight-line displacement.
        </p>
        <button onclick="setTab('optimizer')" style="display:inline-flex;align-items:center;gap:8px;background:#fff;color:#1d4ed8;font-size:13px;font-weight:700;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;transition:all .2s" onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background='#fff'">
          Optimize a Route →
        </button>
      </div>
    </div>
    <div class="stats-grid">
      ${statCard('📦','Total Deliveries', s.totalDel || 0,'blue', state.history.length > 0 ? state.history.length + ' routes' : 'Run first route')}
      ${statCard('🛣️','Total Road Distance', s.totalDist > 0 ? s.totalDist + ' km' : '0 km','green', state.result ? 'Last: ' + (state.result.distance > 0 ? state.result.distance + ' km' : 'Calculating…') : 'No data yet')}
      ${statCard('⏱️','Last Route Time', s.lastTime,'amber','Latest optimization')}
      ${statCard('⛽','Total Fuel Cost', s.totalFuel > 0 ? '₹' + s.totalFuel : '₹0','violet', state.history.length + ' computations')}
    </div>
    <div class="quick-grid">
      <div class="quick-card" onclick="setTab('optimizer')">
        <div class="quick-icon" style="background:#eff6ff;font-size:20px">🗺️</div>
        <div class="quick-title">Optimize New Route</div>
        <div class="quick-desc">TSP sequence + real road distance via OpenStreetMap routing</div>
        <div style="margin-top:12px;font-size:11px;font-weight:600;color:var(--brand)">Open →</div>
      </div>
      <div class="quick-card" onclick="setTab('analytics')">
        <div class="quick-icon" style="background:#ecfdf5;font-size:20px">📊</div>
        <div class="quick-title">View Analytics</div>
        <div class="quick-desc">Road distance and fuel cost trends across all runs</div>
        <div style="margin-top:12px;font-size:11px;font-weight:600;color:#059669">Open →</div>
      </div>
      <div class="quick-card" onclick="setTab('history')">

// ── Map ────────────────────────────────────────────────────────────────
function initMap() {
  const el = document.getElementById('map');
  if (!el) return;
  if (state.map) { try { state.map.remove(); } catch(e){} state.map = null; state.layerGroup = null; }
  const center = state.warehouse ? [state.warehouse.lat, state.warehouse.lng] : [22.7196, 75.8577];
  const map = L.map('map', { center, zoom: 13 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19
  }).addTo(map);
  state.map = map;
  state.layerGroup = L.layerGroup().addTo(map);
  if (state.result && !state.roadDistLoading) {
    updateMapMarkersAndDistance();
  }
}

// ── Draw markers + road polylines from OSRM ───────────────────────────
async function updateMapMarkersAndDistance() {
  const { map, layerGroup, result, warehouse } = state;
  if (!map || !layerGroup || !result) return;

  layerGroup.clearLayers();
  const routeStops = result.route_stops;
  const colors = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#8b5cf6'];
  const bounds = [];

  function addWarehouseMarker() {
    if (!warehouse) return;
    const icon = L.divIcon({
      html: `<div style="width:40px;height:40px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 4px 14px rgba(37,99,235,.45);font-size:18px;">🏭</div>`,
      className: '', iconSize: [40,40], iconAnchor: [20,20]
    });
    L.marker([warehouse.lat, warehouse.lng], { icon })
      .addTo(layerGroup)
      .bindPopup(`<b>${warehouse.name}</b><br>Warehouse / Start Point`);
    bounds.push([warehouse.lat, warehouse.lng]);
  }

  function addStopMarkers() {
    routeStops.forEach((stop, i) => {
      const isWH = stop.name === warehouse?.name && (i === 0 || i === routeStops.length - 1);
      if (isWH) return;
      const color = colors[i % colors.length];
      const icon = L.divIcon({
        html: `<div style="width:34px;height:34px;background:${color};border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800;border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.25)">${stop.order}</div>`,
        className: '', iconSize: [34,34], iconAnchor: [17,17]
      });
      L.marker([stop.lat, stop.lng], { icon })
        .addTo(layerGroup)
        .bindPopup(`<b>${stop.name}</b><br>Stop #${stop.order}`);
      bounds.push([stop.lat, stop.lng]);
    });
  }

  // Phase 1: markers + dashed preview
  addWarehouseMarker();
  addStopMarkers();
  if (routeStops.length > 1) {
    const previewCoords = routeStops.map(s => [s.lat, s.lng]);
    L.polyline(previewCoords, { color:'#94a3b8', weight:2, opacity:.45, dashArray:'6 6', lineCap:'round' }).addTo(layerGroup);
  }
  if (bounds.length > 1) map.fitBounds(bounds, { padding:[50,50] });
  else if (bounds.length === 1) map.setView(bounds[0], 14);

  // Phase 2: fetch real road segments from OSRM
  const speed    = parseFloat(document.getElementById('speed')?.value     || '40');
  const fuelRate = parseFloat(document.getElementById('fuel-cost')?.value || '8');
  let totalRoadDist = 0;
  let osrmSuccess   = 0;
  const roadPolylines = [];

  for (let i = 0; i < routeStops.length - 1; i++) {
    const from = routeStops[i];
    const to   = routeStops[i + 1];
    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
      const res  = await fetch(url, { signal: AbortSignal.timeout(10000) });
      const data = await res.json();
      if (data.code !== 'Ok') throw new Error('OSRM code: ' + data.code);
      const route = data.routes[0];
      totalRoadDist += route.distance / 1000;   // ← REAL road distance in km
      osrmSuccess++;
      const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
      roadPolylines.push(coords);
    } catch (err) {
      console.warn(`[RouteFlow] OSRM segment ${i+1} failed:`, err.message);
      roadPolylines.push(null);
    }
  }

  // Phase 3: redraw with real road polylines
  layerGroup.clearLayers();
  addWarehouseMarker();
  addStopMarkers();
  roadPolylines.forEach((coords, i) => {
    if (coords) {
      L.polyline(coords, { color:'#94a3b8', weight:8, opacity:.3,  lineCap:'round', lineJoin:'round' }).addTo(layerGroup);
      L.polyline(coords, { color:'#2563eb', weight:5, opacity:.95, lineCap:'round', lineJoin:'round' }).addTo(layerGroup);
    } else {
      const from = routeStops[i], to = routeStops[i+1];
      L.polyline([[from.lat,from.lng],[to.lat,to.lng]], {
        color:'#ef4444', weight:3, opacity:.7, dashArray:'8 4'
      }).addTo(layerGroup);
    }
  });

  // Phase 4: update state with REAL road distance
  totalRoadDist = Math.round(totalRoadDist * 10) / 10;
  const mins    = Math.round((totalRoadDist / speed) * 60);
  const timeStr = mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60}min` : `${mins} min`;
  const fuelCost = Math.round(totalRoadDist * fuelRate * 10) / 10;

  state.result.distance  = totalRoadDist;
  state.result.time      = timeStr;
  state.result.fuel_cost = fuelCost;
  state.roadDistLoading  = false;

  // Patch history entry with real values
  if (state.history.length > 0 && state.history[0].id === state.result.id) {
    state.history[0].distance  = totalRoadDist;
    state.history[0].time      = timeStr;
    state.history[0].fuel_cost = fuelCost;
  }

  // Refresh form-panel only (map stays alive)
  const fp = document.getElementById('form-panel');
  if (fp) fp.innerHTML = renderForm() + renderResult();
}

// ── Main optimize function ─────────────────────────────────────────────
async function optimizeRoute() {
  const whName   = document.getElementById('wh-name')?.value;
  const whLat    = parseFloat(document.getElementById('wh-lat')?.value);
  const whLng    = parseFloat(document.getElementById('wh-lng')?.value);
  const speed    = parseFloat(document.getElementById('speed')?.value    || '40');
  const fuelCost = parseFloat(document.getElementById('fuel-cost')?.value || '8');

  if (!whName || isNaN(whLat) || isNaN(whLng)) {
    state.error = 'Please fill in all warehouse fields with valid coordinates';
    render(); return;
  }
  const validLocs = state.locationInputs.filter(l => l.name && l.lat && l.lng && !isNaN(parseFloat(l.lat)));
  if (validLocs.length < 1) {
    state.error = 'Please add at least one delivery location with valid coordinates';
    render(); return;
  }

  state.loading = true;
  state.error   = null;
  state.warehouse = { name: whName, lat: whLat, lng: whLng };
  render();

  const payload = {
    warehouse: { name: whName, lat: whLat, lng: whLng },
    locations: validLocs.map(l => ({ name: l.name, lat: parseFloat(l.lat), lng: parseFloat(l.lng) })),
    speed, fuel_cost: fuelCost
  };

  try {
    const apiUrl = (typeof window !== 'undefined' && window.NEXT_PUBLIC_API_URL) || 'http://localhost:8000';
    const res = await fetch(apiUrl + '/optimize-route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(10000)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'API error ' + res.status);
    }
    state.result = await res.json();
    state.roadDistLoading = false;
  } catch (err) {
    // Demo mode: TSP for ordering only, OSRM will provide real distances
    console.warn('Backend not reachable, demo mode:', err.message);
    state.result = simulateTSP(payload);
    state.roadDistLoading = true;  // OSRM will fill in real distances
    state.error = null;
  }

  // Add to history — distance starts at 0, will be patched after OSRM
  const entry = {
    id:        state.result.id || Date.now().toString(),
    warehouse: whName,
    stops:     validLocs.length,
    distance:  0,              // ← starts at 0; OSRM will update
    time:      'Calculating...',
    fuel_cost: 0,
    timestamp: state.result.timestamp
  };
  state.result.id = entry.id;
  state.history.unshift(entry);

  state.loading = false;
  updateApiBadge(true);

  const fp = document.getElementById('form-panel');
  if (fp) {
    fp.innerHTML = renderForm() + renderResult();
    await updateMapMarkersAndDistance();
  } else {
    render();
    await new Promise(r => requestAnimationFrame(r));
    initMap();
    await new Promise(r => setTimeout(r, 100));
    await updateMapMarkersAndDistance();
  }
}

// ── Client-side TSP (nearest-neighbour) — route ORDER only ───────────
// Distance starts at 0; OSRM provides actual road distances later.
function simulateTSP(payload) {
  const { warehouse, locations, speed, fuel_cost } = payload;
  const nodes = [warehouse, ...locations];
  const n = nodes.length;

  function haversine(a, b) {
    const R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
    const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  }

  const visited = Array(n).fill(false);
  const route   = [0]; visited[0] = true;
  for (let k = 0; k < n-1; k++) {
    let cur = route[route.length-1], best = -1, bestD = Infinity;
    for (let j = 0; j < n; j++) {
      if (!visited[j]) { const d = haversine(nodes[cur], nodes[j]); if (d < bestD) { bestD = d; best = j; } }
    }
    route.push(best); visited[best] = true;
  }
  route.push(0);

  // Distance and fuel intentionally 0 — OSRM will set real values
  const stops = route.map((idx, order) => ({
    name:  idx === 0 ? warehouse.name : locations[idx-1].name,
    lat:   nodes[idx].lat, lng: nodes[idx].lng, order
  }));

  return {
    id:          Date.now().toString(),
    route:       route.map(i => i === 0 ? warehouse.name : locations[i-1].name),
    route_stops: stops,
    distance:    0,              // ← provisional; OSRM fills this in
    time:        'Calculating...',
    fuel_cost:   0,
    stops_count: locations.length,
    timestamp:   new Date().toISOString()
  };
}
